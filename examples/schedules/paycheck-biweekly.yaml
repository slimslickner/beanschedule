# Bi-weekly paycheck (matches actual Hoogle payroll in example ledger)
# Demonstrates: WEEKLY frequency, multiple payee patterns, complex multi-posting transaction,
# and multi-currency postings (VACHR vacation accrual, GOOGL RSU vesting)
id: paycheck-biweekly
enabled: true
match:
  account: Assets:US:BofA:Checking
  payee_pattern: "Hoogle"
  amount: 1350.60
  amount_tolerance: 50.00
  amount_min: null
  amount_max: null
  date_window_days: 2
recurrence:
  rrule: FREQ=WEEKLY;INTERVAL=2;BYDAY=TH
  start_date: 2013-01-03
transaction:
  payee: Hoogle
  narration: Payroll
  tags: []
  metadata:
    schedule_id: paycheck-biweekly
    category: income
  postings:
    - account: Assets:US:BofA:Checking
      amount: null
      metadata:
        narration: Net Deposit
    - account: Assets:US:Vanguard:Cash
      amount: 1200.00
      metadata:
        narration: 401k Contribution
    - account: Income:US:Hoogle:Salary
      amount: -4615.38
      metadata:
        narration: Gross Salary
    - account: Expenses:Taxes:Y2013:US:Federal
      amount: 1062.92
      metadata:
        narration: Federal Tax
    - account: Expenses:Taxes:Y2013:US:State
      amount: 365.08
      metadata:
        narration: State Tax
    - account: Expenses:Taxes:Y2013:US:SocSec
      amount: 281.54
      metadata:
        narration: Social Security Tax
    - account: Expenses:Taxes:Y2013:US:Medicare
      amount: 106.62
      metadata:
        narration: Medicare Tax
    # Vacation accrual: 4 hours per paycheck in VACHR (non-default currency)
    - account: Assets:Vacation
      amount: 4.00
      currency: VACHR
      metadata:
        narration: Vacation Accrual
    - account: Income:US:Hoogle:Vacation
      amount: -4.00
      currency: VACHR
      metadata:
        narration: Vacation Accrual
    # RSU vesting: 5 shares of GOOGL per paycheck (non-default currency)
    - account: Assets:US:Hoogle:Vesting
      amount: 5.00
      currency: GOOGL
      metadata:
        narration: RSU Vesting
    - account: Income:US:Hoogle:RSU
      amount: -5.00
      currency: GOOGL
      metadata:
        narration: RSU Vesting
missing_transaction:
  create_placeholder: true
  flag: "!"
  narration_prefix: "[MISSING]"
